<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseTracker - Login</title>
<style>
  :root {
    --navy: #10193a;
    --blue: #3762f0;
    --blue-dark: #2c50d6;
    --text-dark: #10193a;
    --text-muted: #8a90a6;
    --border: #e6e8f0;
    --bg-page: #eef0f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg-page);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 16px;
  }

  .card {
    width: 100%;
    max-width: 340px;
    background: #ffffff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(16, 25, 58, 0.08);
  }

  .card-header {
    background: var(--navy);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header .logo-icon {
    width: 22px;
    height: 22px;
    background: var(--blue);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .card-header .logo-text {
    color: #ffffff;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.2px;
  }

  .card-body {
    padding: 28px 26px 24px;
  }

  .illustration {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }

  .illustration svg {
    width: 88px;
    height: 88px;
  }

  h1.welcome {
    text-align: center;
    font-size: 21px;
    color: var(--text-dark);
    font-weight: 700;
    margin-bottom: 4px;
  }

  p.subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--blue);
    font-weight: 500;
    margin-bottom: 22px;
  }

  .field-group {
    margin-bottom: 16px;
  }

  .field-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper .icon {
    position: absolute;
    left: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
  }

  .input-wrapper input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-dark);
    background: #fbfbfd;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .input-wrapper input::placeholder {
    color: #b3b7c6;
  }

  .input-wrapper input:focus {
    border-color: var(--blue);
    background: #ffffff;
  }

  .input-wrapper .toggle-eye {
    position: absolute;
    right: 12px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    background: none;
    border: none;
    padding: 0;
  }

  .row-between {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0 20px;
    font-size: 12.5px;
  }

  .remember-me {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dark);
  }

  .remember-me input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--blue);
    cursor: pointer;
  }

  .forgot-link {
    color: var(--blue);
    text-decoration: none;
    font-weight: 500;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--blue);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .btn-login:hover {
    background: var(--blue-dark);
  }

  .register-text {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: 18px;
  }

  .register-text a {
    color: var(--blue);
    font-weight: 600;
    text-decoration: none;
  }

  .register-text a:hover {
    text-decoration: underline;
  }

  .caption {
    margin-top: 22px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: var(--text-dark);
    text-align: center;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo-icon">💳</div>
      <div class="logo-text">ExpenseTracker</div>
    </div>

    <div class="card-body">
      <div class="illustration">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="30" width="68" height="48" rx="8" fill="#3762f0"/>
          <rect x="12" y="30" width="68" height="14" rx="6" fill="#2c50d6"/>
          <circle cx="70" cy="58" r="9" fill="#ffd166"/>
          <circle cx="70" cy="58" r="5.5" fill="#ffb800"/>
          <circle cx="30" cy="24" r="9" fill="#ffd166"/>
          <circle cx="30" cy="24" r="5.5" fill="#ffb800"/>
          <circle cx="46" cy="18" r="7" fill="#ffe08a"/>
          <circle cx="46" cy="18" r="4.2" fill="#ffb800"/>
        </svg>
      </div>

      <h1 class="welcome">Welcome Back!</h1>
      <p class="subtitle">Login to your account</p>

      <form onsubmit="return false;">
        <div class="field-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="email" id="email" placeholder="Enter your email">
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="password" id="password" placeholder="Enter your password">
            <button type="button" class="toggle-eye" onclick="togglePassword()">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="row-between">
          <label class="remember-me">
            <input type="checkbox">
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>

      <p class="register-text">Don't have an account? <a href="#">Register here</a></p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }
  </script>
  <script src="./js/login.js"></script>

</body>
</html>
