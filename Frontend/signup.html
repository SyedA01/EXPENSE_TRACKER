<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseTracker - Register</title>
<style>
  :root {
    --navy: #10193a;
    --blue: #3762f0;
    --blue-dark: #2c50d6;
    --text-dark: #10193a;
    --text-muted: #8a90a6;
    --border: #e6e8f0;
    --bg-page: #eef0f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg-page);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 16px;
  }

  .card {
    width: 100%;
    max-width: 340px;
    background: #ffffff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(16, 25, 58, 0.08);
    border: 1px solid var(--navy);
  }

  .card-body {
    padding: 28px 26px 24px;
  }

  .illustration {
    display: flex;
    justify-content: center;
    margin-bottom: 14px;
  }

  .illustration svg {
    width: 84px;
    height: 84px;
  }

  h1.welcome {
    text-align: center;
    font-size: 20px;
    color: var(--blue);
    font-weight: 700;
    margin-bottom: 4px;
  }

  p.subtitle {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .field-group {
    margin-bottom: 14px;
  }

  .field-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper .icon {
    position: absolute;
    left: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
  }

  .input-wrapper input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-dark);
    background: #fbfbfd;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .input-wrapper input::placeholder {
    color: #b3b7c6;
  }

  .input-wrapper input:focus {
    border-color: var(--blue);
    background: #ffffff;
  }

  .input-wrapper .toggle-eye {
    position: absolute;
    right: 12px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    background: none;
    border: none;
    padding: 0;
  }

  .terms-row {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin: 14px 0 18px;
    font-size: 12.5px;
    color: var(--text-dark);
  }

  .terms-row input[type="checkbox"] {
    width: 14px;
    height: 14px;
    margin-top: 2px;
    accent-color: var(--blue);
    cursor: pointer;
  }

  .terms-row a {
    color: var(--blue);
    font-weight: 600;
    text-decoration: none;
  }

  .terms-row a:hover {
    text-decoration: underline;
  }

  .btn-register {
    width: 100%;
    padding: 12px;
    background: var(--blue);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .btn-register:hover {
    background: var(--blue-dark);
  }

  .login-text {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: 16px;
  }

  .login-text a {
    color: var(--blue);
    font-weight: 600;
    text-decoration: none;
  }

  .login-text a:hover {
    text-decoration: underline;
  }

  .caption {
    margin-top: 22px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: var(--text-dark);
    text-align: center;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="card-body">
      <div class="illustration">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="30" width="68" height="48" rx="8" fill="#10193a"/>
          <rect x="12" y="30" width="68" height="14" rx="6" fill="#0a1230"/>
          <rect x="46" y="20" width="30" height="20" rx="4" fill="#2ecc71"/>
          <circle cx="70" cy="58" r="9" fill="#ffd166"/>
          <circle cx="70" cy="58" r="5.5" fill="#ffb800"/>
          <circle cx="30" cy="24" r="9" fill="#ffd166"/>
          <circle cx="30" cy="24" r="5.5" fill="#ffb800"/>
        </svg>
      </div>

      <h1 class="welcome">Create Account</h1>
      <p class="subtitle">Register to get started</p>

      <form onsubmit="return false;">
        <div class="field-group">
          <label for="fullname">Full Name</label>
          <div class="input-wrapper">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="fullname" placeholder="Enter your full name">
          </div>
        </div>

        <div class="field-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M3 6l9 7 9-7"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
            </span>
            <input type="email" id="email" placeholder="Enter your email">
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
            </span>
            <input type="password" id="password" placeholder="Create a password">
            <button type="button" class="toggle-eye" onclick="togglePassword('password')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="field-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="input-wrapper">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
            </span>
            <input type="password" id="confirm-password" placeholder="Confirm your password">
            <button type="button" class="toggle-eye" onclick="togglePassword('confirm-password')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <label class="terms-row">
          <input type="checkbox">
          <span>I agree to the <a href="#">Terms &amp; Conditions</a></span>
        </label>

        <button type="submit" class="btn-register">Register</button>
      </form>

      <p class="login-text">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <p class="caption">2. REGISTER PAGE</p>

  <script>
    function togglePassword(id) {
      const field = document.getElementById(id);
      field.type = field.type === 'password' ? 'text' : 'password';
    }
  </script>
  <script src="./js/signup.js"></script>

</body>
</html>
